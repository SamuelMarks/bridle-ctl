name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libsqlite3-dev llvm llvm-dev libclang-dev clang
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run tests and collect coverage
        run: cargo tarpaulin --out Xml --fail-under 100 --rustflags="--cfg tarpaulin_include" --exclude-files "bridle-agent/src/agent_loop.rs" "bridle-agent/src/team_simulation.rs" "bridle-cli/src/batch_executor.rs" "bridle-cli/src/batch_fix.rs" "bridle-cli/src/batch_pipeline.rs" "bridle-cli/src/db.rs" "bridle-cli/src/forge_mutator.rs" "bridle-cli/src/ingest.rs" "bridle-cli/src/sync_prs.rs" "bridle-cli/src/workspace.rs" "bridle-sdk/src/batch_db.rs" "bridle-sdk/src/db.rs" "bridle-sdk/src/lib.rs" "bridle-sdk/src/encoding.rs" "bridle-sdk/src/ffi.rs" "bridle-sdk/src/file_lock.rs" "bridle-sdk/src/error.rs" "bridle-agent/src/mcp.rs" "bridle-cli/src/main.rs" "bridle-rpc/src/main.rs" "bridle-agent/src/main.rs" "bridle-cli/src/runner.rs" "bridle-cli/src/tui.rs" "bridle-cli/src/tools/registry.rs" "bridle-rest/src/main.rs"
      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: cobertura.xml

  ui:
    name: UI Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bridle-ui
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./bridle-ui/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test -- --browsers=ChromeHeadless
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: npm run e2e
